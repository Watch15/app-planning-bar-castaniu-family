<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Templyo">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Connexion — Templyo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark-bg:      #0f0f1a;
            --dark-surface: #1a1a2e;
            --dark-border:  #2a2a42;
            --accent:       #6C63FF;
            --accent-soft:  #534AB7;
            --accent-glow:  rgba(108,99,255,0.15);
            --light-bg:     #f4f5f8;
            --light-card:   #ffffff;
            --light-border: #e8eaed;
            --text-primary: #1a1a2e;
            --text-muted:   #8892a4;
            --danger:       #ef4444;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
            /* subtle noise texture */
            background-image:
                radial-gradient(ellipse at 20% 80%, rgba(108,99,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(83,74,183,0.06) 0%, transparent 50%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin: auto 0;
        }

        /* ── Logo au-dessus ── */
        .login-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .login-brand-icon {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 16px; font-weight: 700;
            box-shadow: 0 4px 14px rgba(108,99,255,0.35);
        }
        .login-brand-text {
            font-size: 17px; font-weight: 700; color: #fff;
            letter-spacing: -0.3px;
        }

        /* ── Card ── */
        .login-card {
            background: var(--light-card);
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.12);
        }

        .login-logo {
            display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
        }
        .login-logo-icon {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 16px; font-weight: 700;
            box-shadow: 0 4px 14px rgba(108,99,255,0.35);
        }
        .login-logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.2px; }
        .login-logo-sub  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

        h1 {
            font-size: 21px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 4px; letter-spacing: -0.3px;
        }
        .login-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

        /* ── Toggle Email / Téléphone ── */
        .login-toggle {
            display: flex; background: var(--light-bg); border-radius: 10px;
            padding: 3px; margin-bottom: 20px; gap: 2px;
        }
        .login-toggle-btn {
            flex: 1; padding: 8px; border: none; border-radius: 8px;
            background: transparent; font-size: 13px; font-weight: 500; color: var(--text-muted);
            cursor: pointer; transition: all 0.15s; font-family: var(--font);
        }
        .login-toggle-btn.active {
            background: var(--dark-surface); color: #fff; font-weight: 600;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        .field { margin-bottom: 16px; }

        label {
            display: block; font-size: 11px; font-weight: 600;
            color: var(--text-muted); margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"],
        input[type="tel"] {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid var(--light-border); border-radius: 8px;
            font-size: 14px; font-family: var(--font); color: var(--text-primary);
            outline: none; transition: border-color 0.15s, box-shadow 0.15s;
            background: var(--light-bg);
        }
        input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        input::placeholder { color: var(--text-muted); }

        .password-wrap { position: relative; }
        .toggle-pw {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 13px; padding: 4px;
        }
        .toggle-pw:hover { color: var(--text-primary); }

        .error-msg {
            background: #fff5f5; border: 1px solid #fca5a5; color: #991b1b;
            border-radius: 8px; padding: 10px 12px; font-size: 13px;
            margin-bottom: 16px; display: none;
        }
        .error-msg.visible { display: block; }

        .btn-login {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: var(--dark-surface); color: white;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background 0.15s; margin-top: 8px; font-family: var(--font);
        }
        .btn-login:hover:not(:disabled) { background: var(--accent); }
        .btn-login:disabled { background: #c8ccd6; cursor: not-allowed; }

        .login-footer { margin-top: 20px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.25); }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Lien mot de passe oublié */
        a.forgot-link {
            font-size: 12px; color: var(--text-muted); text-decoration: none;
            transition: color 0.15s;
        }
        a.forgot-link:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-brand">
        <div class="login-brand-icon">T</div>
        <div class="login-brand-text">Templyo</div>
    </div>

    <div class="login-card">
        <h1>Connexion</h1>
        <p class="login-subtitle">Connecte-toi à ton compte.</p>

        <!-- Toggle Email / Téléphone -->
        <div class="login-toggle">
            <button class="login-toggle-btn active" id="toggle-email-btn" onclick="switchMode('email')">📧 Email</button>
            <button class="login-toggle-btn"        id="toggle-phone-btn" onclick="switchMode('phone')">📱 Téléphone</button>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <!-- ── Mode Email ── -->
        <div id="mode-email">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="ton@email.com" autocomplete="email" autofocus>
            </div>
            <div class="field">
                <label for="password-email">Mot de passe</label>
                <div class="password-wrap">
                    <input type="password" id="password-email" placeholder="••••••••" autocomplete="current-password">
                    <button class="toggle-pw" id="toggle-pw-email" type="button">👁</button>
                </div>
            </div>
            <button class="btn-login" id="btn-login-email">Se connecter</button>
            <div style="text-align:center;margin-top:14px">
                <a href="#" class="forgot-link" id="link-forgot-email">Mot de passe oublié ?</a>
            </div>
            <div id="forgot-form-email" style="display:none;margin-top:14px">
                <div class="field">
                    <label for="reset-email">Ton email</label>
                    <input type="email" id="reset-email" placeholder="ton@email.com">
                </div>
                <button class="btn-login" id="btn-reset-email" style="background:var(--accent-soft)">Envoyer le lien par email</button>
            </div>
        </div>

        <!-- ── Mode Téléphone ── -->
        <div id="mode-phone" style="display:none">
            <div class="field">
                <label for="phone">Téléphone</label>
                <input type="tel" id="phone" placeholder="06 12 34 56 78" autocomplete="tel">
            </div>
            <div class="field">
                <label for="password-phone">Mot de passe</label>
                <div class="password-wrap">
                    <input type="password" id="password-phone" placeholder="••••••••" autocomplete="current-password">
                    <button class="toggle-pw" id="toggle-pw-phone" type="button">👁</button>
                </div>
            </div>
            <button class="btn-login" id="btn-login-phone">Se connecter</button>
            <div style="text-align:center;margin-top:14px">
                <a href="#" class="forgot-link" id="link-forgot-phone">Mot de passe oublié ?</a>
            </div>
            <div id="forgot-form-phone" style="display:none;margin-top:14px">
                <div class="field">
                    <label for="reset-phone">Ton numéro</label>
                    <input type="tel" id="reset-phone" placeholder="06 12 34 56 78">
                </div>
                <button class="btn-login" id="btn-reset-phone" style="background:var(--accent-soft)">Envoyer le lien par SMS</button>
            </div>
        </div>
    </div>

    <div class="login-footer">Templyo &copy; <span id="copyright-year">2026</span></div>
</div>

<script>document.getElementById('copyright-year').textContent = new Date().getFullYear();</script>

<script>
    // Vérifier si déjà connecté
    fetch('/auth/me', { credentials: 'include' })
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data?.user) redirectByRole(data.user.role); })
        .catch(() => {});

    // ── Toggle mode ───────────────────────────────────────────────────────────

    function switchMode(mode) {
        hideError();
        document.getElementById('toggle-email-btn').classList.toggle('active', mode === 'email');
        document.getElementById('toggle-phone-btn').classList.toggle('active', mode === 'phone');
        document.getElementById('mode-email').style.display = mode === 'email' ? '' : 'none';
        document.getElementById('mode-phone').style.display = mode === 'phone' ? '' : 'none';
        if (mode === 'email') document.getElementById('email').focus();
        else                  document.getElementById('phone').focus();
    }

    // ── Mode Email ────────────────────────────────────────────────────────────

    document.getElementById('toggle-pw-email').addEventListener('click', () => {
        const pw = document.getElementById('password-email');
        pw.type = pw.type === 'password' ? 'text' : 'password';
    });
    document.getElementById('email').addEventListener('keydown',          e => { if (e.key === 'Enter') loginEmail(); });
    document.getElementById('password-email').addEventListener('keydown', e => { if (e.key === 'Enter') loginEmail(); });
    document.getElementById('btn-login-email').addEventListener('click', loginEmail);

    async function loginEmail() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password-email').value;
        if (!email || !password) { showError('Remplis tous les champs.'); return; }
        const btn = document.getElementById('btn-login-email');
        setLoading(btn, true, 'Connexion…');
        hideError();
        try {
            const res  = await fetch('/auth/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password }),
            });
            const data = await res.json();
            if (!res.ok) { showError(data.error || 'Erreur de connexion.'); return; }
            redirectByRole(data.user.role);
        } catch { showError('Impossible de contacter le serveur.'); }
        finally { setLoading(btn, false, 'Se connecter'); }
    }

    // Mot de passe oublié — email
    document.getElementById('link-forgot-email').addEventListener('click', e => {
        e.preventDefault();
        const f = document.getElementById('forgot-form-email');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    });
    document.getElementById('btn-reset-email').addEventListener('click', async () => {
        const email = document.getElementById('reset-email').value.trim();
        if (!email) { showError('Saisis ton email.'); return; }
        const btn = document.getElementById('btn-reset-email');
        setLoading(btn, true, 'Envoi…');
        hideError();
        try {
            const res  = await fetch('/auth/forgot-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email }),
            });
            const data = await res.json();
            if (data.manual && data.link) {
                document.getElementById('forgot-form-email').innerHTML =
                    '<div style="background:#fffbeb;border:1.5px solid #f59e0b;border-radius:8px;padding:12px;font-size:12px">' +
                    '<div style="font-weight:600;color:#92400e;margin-bottom:6px">Email non envoyé — copie ce lien :</div>' +
                    '<div style="word-break:break-all;color:#555;cursor:pointer;text-decoration:underline" ' +
                    'onclick="navigator.clipboard.writeText(this.dataset.link);" data-link="' + data.link + '">' +
                    data.link + '</div></div>';
            } else {
                document.getElementById('forgot-form-email').innerHTML =
                    '<div style="background:#f0fdf4;border:1px solid #a8dfc7;border-radius:8px;padding:12px;font-size:13px;color:#065f46">Si cet email existe, un lien a été envoyé.</div>';
            }
        } catch { showError('Impossible de contacter le serveur.'); }
        finally { setLoading(btn, false, 'Envoyer le lien'); }
    });

    // ── Mode Téléphone ────────────────────────────────────────────────────────

    document.getElementById('toggle-pw-phone').addEventListener('click', () => {
        const pw = document.getElementById('password-phone');
        pw.type = pw.type === 'password' ? 'text' : 'password';
    });
    document.getElementById('phone').addEventListener('keydown',          e => { if (e.key === 'Enter') loginPhone(); });
    document.getElementById('password-phone').addEventListener('keydown', e => { if (e.key === 'Enter') loginPhone(); });
    document.getElementById('btn-login-phone').addEventListener('click', loginPhone);

    async function loginPhone() {
        const phone    = document.getElementById('phone').value.trim();
        const password = document.getElementById('password-phone').value;
        if (!phone || !password) { showError('Remplis tous les champs.'); return; }
        const btn = document.getElementById('btn-login-phone');
        setLoading(btn, true, 'Connexion…');
        hideError();
        try {
            const res  = await fetch('/auth/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ phone, password }),
            });
            const data = await res.json();
            if (!res.ok) { showError(data.error || 'Erreur de connexion.'); return; }
            redirectByRole(data.user.role);
        } catch { showError('Impossible de contacter le serveur.'); }
        finally { setLoading(btn, false, 'Se connecter'); }
    }

    // Mot de passe oublié — téléphone
    document.getElementById('link-forgot-phone').addEventListener('click', e => {
        e.preventDefault();
        const f = document.getElementById('forgot-form-phone');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    });
    document.getElementById('btn-reset-phone').addEventListener('click', async () => {
        const phone = document.getElementById('reset-phone').value.trim();
        if (!phone) { showError('Saisis ton numéro.'); return; }
        const btn = document.getElementById('btn-reset-phone');
        setLoading(btn, true, 'Envoi…');
        hideError();
        try {
            const res  = await fetch('/auth/forgot-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone }),
            });
            const data = await res.json();
            if (data.manual && data.link) {
                document.getElementById('forgot-form-phone').innerHTML =
                    '<div style="background:#fffbeb;border:1.5px solid #f59e0b;border-radius:8px;padding:12px;font-size:12px">' +
                    '<div style="font-weight:600;color:#92400e;margin-bottom:6px">SMS non envoyé — copie ce lien :</div>' +
                    '<div style="word-break:break-all;color:#555;cursor:pointer;text-decoration:underline" ' +
                    'onclick="navigator.clipboard.writeText(this.dataset.link);" data-link="' + data.link + '">' +
                    data.link + '</div></div>';
            } else {
                document.getElementById('forgot-form-phone').innerHTML =
                    '<div style="background:#f0fdf4;border:1px solid #a8dfc7;border-radius:8px;padding:12px;font-size:13px;color:#065f46">Si ce numéro existe, un SMS a été envoyé.</div>';
            }
        } catch { showError('Impossible de contacter le serveur.'); }
        finally { setLoading(btn, false, 'Envoyer le lien par SMS'); }
    });

    // ── Utilitaires ───────────────────────────────────────────────────────────

    function redirectByRole(role) {
        if (role === 'patron' || role === 'directeur') window.location.href = '/index.html';
        else if (role === 'etablissement')             window.location.href = '/pointage.html';
        else                                           window.location.href = '/planning.html';
    }

    function setLoading(btn, loading, text) {
        btn.disabled  = loading;
        btn.innerHTML = loading ? '<span class="spinner"></span>' + text : text;
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.add('visible');
    }
    function hideError() { document.getElementById('error-msg').classList.remove('visible'); }
</script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
</body>
</html>
