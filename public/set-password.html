<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer mon mot de passe — Planning Bar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark-bg:      #0f0f1a;
            --dark-surface: #1a1a2e;
            --accent:       #6C63FF;
            --accent-soft:  #534AB7;
            --accent-glow:  rgba(108,99,255,0.15);
            --light-bg:     #f4f5f8;
            --light-card:   #ffffff;
            --light-border: #e8eaed;
            --text-primary: #1a1a2e;
            --text-muted:   #8892a4;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 80%, rgba(108,99,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(83,74,183,0.06) 0%, transparent 50%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .login-brand {
            display: flex; align-items: center; gap: 10px;
        }
        .login-brand-icon {
            width: 36px; height: 36px; background: var(--accent); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 16px; font-weight: 700;
            box-shadow: 0 4px 14px rgba(108,99,255,0.35);
        }
        .login-brand-text { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }

        .card {
            background: var(--light-card);
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.12);
        }

        .logo {
            display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
        }
        .logo-icon {
            width: 36px; height: 36px; background: var(--dark-surface); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 16px; font-weight: 700;
        }
        .logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.2px; }
        .logo-sub  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

        h1 {
            font-size: 20px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 4px; letter-spacing: -0.3px;
        }
        .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

        .field { margin-bottom: 16px; }
        label {
            display: block; font-size: 11px; font-weight: 600;
            color: var(--text-muted); margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        input[type="password"] {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid var(--light-border); border-radius: 8px;
            font-size: 14px; font-family: var(--font); color: var(--text-primary);
            outline: none; transition: border-color 0.15s, box-shadow 0.15s;
            background: var(--light-bg);
        }
        input:focus {
            border-color: var(--accent); background: #fff;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        input::placeholder { color: var(--text-muted); }

        .msg {
            border-radius: 8px; padding: 10px 12px;
            font-size: 13px; margin-bottom: 16px; display: none;
        }
        .msg.error   { background: #fff5f5; border: 1px solid #fca5a5; color: #991b1b; }
        .msg.success { background: #f0fdf4; border: 1px solid #a8dfc7; color: #065f46; }
        .msg.visible { display: block; }

        .btn {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: var(--dark-surface); color: white;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background 0.15s; margin-top: 8px; font-family: var(--font);
        }
        .btn:hover:not(:disabled) { background: var(--accent); }
        .btn:disabled { background: #c8ccd6; cursor: not-allowed; }

        .footer { margin-top: 20px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-brand">
        <div class="login-brand-icon">P</div>
        <div class="login-brand-text">Planning Bar</div>
    </div>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">P</div>
            <div>
                <div class="logo-text">Planning Bar</div>
                <div class="logo-sub" id="logo-sub">Activation du compte</div>
            </div>
        </div>

        <h1 id="page-title">Crée ton mot de passe</h1>
        <p class="subtitle" id="page-subtitle">Choisis un mot de passe pour accéder à ton planning.</p>

        <div class="msg" id="msg"></div>

        <div class="field">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" placeholder="8 caractères minimum" autofocus>
        </div>
        <div class="field">
            <label for="confirm">Confirmer</label>
            <input type="password" id="confirm" placeholder="Répète le mot de passe">
        </div>

        <button class="btn" id="btn-submit">Activer mon compte</button>
    </div>

    <div class="footer">Planning Bar &copy; 2025</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const mode   = params.get('mode'); // 'reset' ou null (invitation)
    const isReset = mode === 'reset';

    // Adapter le titre selon le mode
    if (isReset) {
        document.querySelector('#page-title').textContent    = 'Nouveau mot de passe';
        document.querySelector('#page-subtitle').textContent = 'Choisis un nouveau mot de passe pour ton compte.';
        document.getElementById('btn-submit').textContent    = 'Mettre à jour';
        document.getElementById('logo-sub').textContent      = 'Réinitialisation du mot de passe';
    }

    if (!token) {
        showMsg('Lien invalide ou expiré.', 'error');
        document.getElementById('btn-submit').disabled = true;
    }

    document.getElementById('btn-submit').addEventListener('click', async () => {
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;

        if (password.length < 8) { showMsg('8 caractères minimum.', 'error'); return; }
        if (password !== confirm) { showMsg('Les mots de passe ne correspondent pas.', 'error'); return; }

        const btn = document.getElementById('btn-submit');
        btn.disabled    = true;
        btn.textContent = 'Mise à jour…';

        const route  = isReset ? '/auth/reset-password' : '/auth/set-password';
        const method = isReset ? 'PATCH' : 'POST';

        try {
            const res  = await fetch(route, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token, password }),
            });
            const data = await res.json();

            if (!res.ok) {
                showMsg(data.error || 'Erreur.', 'error');
                btn.disabled    = false;
                btn.textContent = isReset ? 'Mettre à jour' : 'Activer mon compte';
                return;
            }

            showMsg(isReset ? 'Mot de passe mis à jour ! Redirection…' : 'Compte activé ! Redirection…', 'success');
            setTimeout(() => window.location.href = '/login.html', 2000);
        } catch {
            showMsg('Impossible de contacter le serveur.', 'error');
            btn.disabled    = false;
            btn.textContent = isReset ? 'Mettre à jour' : 'Activer mon compte';
        }
    });

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className   = 'msg ' + type + ' visible';
    }
</script>
</body>
</html>
