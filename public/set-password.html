<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer mon mot de passe — Planning Bar</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: #1a1a2e;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px; font-weight: 700;
        }
        .logo-text  { font-size: 18px; font-weight: 700; color: #1a1a2e; }
        .logo-sub   { font-size: 12px; color: #aaa; margin-top: 1px; }
        h1          { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
        .subtitle   { font-size: 13px; color: #999; margin-bottom: 28px; }
        .field      { margin-bottom: 16px; }
        label       { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
        input[type="password"] {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #e0e0e0; border-radius: 10px;
            font-size: 14px; font-family: inherit; color: #1a1a2e;
            outline: none; transition: border-color 0.15s;
        }
        input:focus { border-color: #534AB7; }
        .msg {
            border-radius: 8px; padding: 10px 12px;
            font-size: 13px; margin-bottom: 16px; display: none;
        }
        .msg.error   { background: #fff5f5; border: 1px solid #f5c6c6; color: #c0392b; }
        .msg.success { background: #f0faf5; border: 1px solid #a8dfc7; color: #1a7a4a; }
        .msg.visible { display: block; }
        .btn {
            width: 100%; padding: 12px; border-radius: 10px;
            border: none; background: #1a1a2e; color: white;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: background 0.15s; margin-top: 8px;
        }
        .btn:hover:not(:disabled) { background: #2c3e50; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .footer { margin-top: 24px; text-align: center; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">P</div>
        <div>
            <div class="logo-text">Planning Bar</div>
            <div class="logo-sub">Activation du compte</div>
        </div>
    </div>

    <h1>Crée ton mot de passe</h1>
    <p class="subtitle">Choisis un mot de passe pour accéder à ton planning.</p>

    <div class="msg" id="msg"></div>

    <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="8 caractères minimum" autofocus>
    </div>
    <div class="field">
        <label for="confirm">Confirmer</label>
        <input type="password" id="confirm" placeholder="Répète le mot de passe">
    </div>

    <button class="btn" id="btn-submit">Activer mon compte</button>
    <div class="footer">Planning Bar &copy; 2025</div>
</div>

<script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
        showMsg('Lien invalide ou expiré.', 'error');
        document.getElementById('btn-submit').disabled = true;
    }

    document.getElementById('btn-submit').addEventListener('click', async () => {
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;

        if (password.length < 8) { showMsg('8 caractères minimum.', 'error'); return; }
        if (password !== confirm) { showMsg('Les mots de passe ne correspondent pas.', 'error'); return; }

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.textContent = 'Activation…';

        try {
            const res  = await fetch('/auth/set-password', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token, password }),
            });
            const data = await res.json();

            if (!res.ok) {
                showMsg(data.error || 'Erreur.', 'error');
                btn.disabled    = false;
                btn.textContent = 'Activer mon compte';
                return;
            }

            showMsg('Compte activé ! Redirection…', 'success');
            setTimeout(() => window.location.href = '/login.html', 2000);
        } catch {
            showMsg('Impossible de contacter le serveur.', 'error');
            btn.disabled    = false;
            btn.textContent = 'Activer mon compte';
        }
    });

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className   = 'msg ' + type + ' visible';
    }
</script>
</body>
</html>
