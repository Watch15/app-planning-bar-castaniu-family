<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon planning — Planning Bar</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            color: #1a1a2e;
        }

        /* ── Header ── */
        .header {
            background: #1a1a2e;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-left  { display: flex; align-items: center; gap: 10px; }
        .header-logo  { font-size: 16px; font-weight: 700; }
        .header-week  { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .btn-logout {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 12px;
            padding: 6px 12px; border-radius: 8px;
            cursor: pointer; transition: background 0.15s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }

        /* ── Bonjour ── */
        .greeting {
            padding: 20px 20px 8px;
        }
        .greeting-name {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .greeting-sub {
            font-size: 13px;
            color: #999;
            margin-top: 2px;
        }

        /* ── Stats semaine ── */
        .week-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 12px 20px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .stat-value { font-size: 22px; font-weight: 700; color: #1a1a2e; }
        .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }

        /* ── Liste des jours ── */
        .days-list {
            padding: 0 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── Carte jour ── */
        .day-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .day-card.today {
            box-shadow: 0 2px 12px rgba(83,74,183,0.15);
            border: 2px solid #534AB7;
        }
        .day-card.no-shift { opacity: 0.5; }

        .day-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f5;
            gap: 12px;
        }
        .day-date-block { min-width: 44px; text-align: center; }
        .day-weekday {
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .day-num {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1;
        }
        .day-card.today .day-weekday,
        .day-card.today .day-num { color: #534AB7; }
        .day-card.no-shift .day-num { color: #ccc; }

        .day-header-right { flex: 1; }
        .day-rest {
            font-size: 13px;
            color: #ccc;
            font-style: italic;
        }
        .today-badge {
            display: none;
            background: #534AB7;
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .day-card.today .today-badge { display: inline-block; }

        /* ── Shift block ── */
        .shift-block {
            padding: 12px 16px;
            border-bottom: 1px solid #f8f8f8;
        }
        .shift-block:last-child { border-bottom: none; }

        .shift-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .shift-establishment {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .shift-hours-badge {
            background: #f0f2f5;
            color: #555;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
        }
        .shift-duration {
            font-size: 12px;
            color: #aaa;
        }

        /* Collègues */
        .colleagues-label {
            font-size: 11px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }
        .colleagues-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .colleague-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f8f8f8;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 12px;
            color: #555;
        }
        .colleague-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── État chargement / erreur ── */
        .state-msg {
            padding: 40px 20px;
            text-align: center;
            font-size: 14px;
            color: #aaa;
        }
        .state-msg.error { color: #e74c3c; }

        /* ── Onglets ── */
        .tabs-bar {
            display: flex;
            gap: 0;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            padding: 0 20px;
            position: sticky;
            top: 56px;
            z-index: 9;
        }
        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            color: #aaa;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.15s;
            position: relative;
        }
        .tab-btn.active { color: #1a1a2e; border-bottom-color: #1a1a2e; }
        .tab-btn:disabled { color: #ccc; cursor: not-allowed; }
        .tab-btn .tab-badge {
            position: absolute;
            top: 8px; right: 6px;
            background: #e74c3c;
            color: white;
            font-size: 9px;
            font-weight: 700;
            width: 16px; height: 16px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── Carte dispo ── */
        .dispo-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .dispo-card.today { border: 2px solid #534AB7; }
        .dispo-day-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            border-bottom: 1px solid #f5f5f5;
        }
        .dispo-day-num { font-size: 22px; font-weight: 700; color: #1a1a2e; min-width: 32px; }
        .dispo-day-name { font-size: 12px; font-weight: 600; color: #aaa; text-transform: uppercase; }
        .dispo-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

        .dispo-type-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .dispo-type-btn {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1.5px solid #e0e0e0;
            background: white;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.15s;
        }
        .dispo-type-btn.selected-soir   { background: #1a1a2e; border-color: #1a1a2e; color: white; }
        .dispo-type-btn.selected-midi   { background: #534AB7; border-color: #534AB7; color: white; }
        .dispo-type-btn.selected-custom { background: #2ecc71; border-color: #2ecc71; color: white; }
        .dispo-type-btn.selected-off    { background: #f5f5f5; border-color: #ddd; color: #bbb; }

        .dispo-custom-row {
            display: none;
            gap: 8px;
            align-items: center;
        }
        .dispo-custom-row.visible { display: flex; }
        .dispo-time-input {
            flex: 1;
            padding: 8px 10px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            outline: none;
        }
        .dispo-time-input:focus { border-color: #2ecc71; }
        .dispo-note-input {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid #f0f0f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            color: #555;
            outline: none;
            resize: none;
        }
        .dispo-note-input:focus { border-color: #aaa; }

        /* ── Empty week ── */
        .empty-week {
            padding: 48px 20px;
            text-align: center;
        }
        .empty-week-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .empty-week-text {
            font-size: 15px;
            font-weight: 600;
            color: #aaa;
        }
        .empty-week-sub {
            font-size: 13px;
            color: #ccc;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div>
            <div class="header-logo">Planning Bar</div>
            <div class="header-week" id="header-week"></div>
        </div>
    </div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
</div>

<div class="tabs-bar">
    <button class="tab-btn active" data-tab="planning">Mon planning</button>
    <button class="tab-btn" data-tab="dispos" id="tab-dispos">Mes dispos</button>
</div>

<div class="greeting">
    <div class="greeting-name" id="greeting-name">Bonjour !</div>
    <div class="greeting-sub" id="greeting-sub">Voici ton planning de la semaine</div>
</div>

<div class="week-stats" id="week-stats"></div>

<div id="view-planning">
<div class="week-stats" id="week-stats-wrap" style="display:none"></div>
<div class="days-list" id="days-list">
    <div class="state-msg">Chargement…</div>
</div>
</div>

<!-- ── Vue disponibilités ── -->
<div id="view-dispos" style="display:none">
    <div class="greeting">
        <div class="greeting-name" id="dispos-title">Mes dispos — semaine prochaine</div>
        <div class="greeting-sub" id="dispos-status"></div>
    </div>
    <div id="dispos-form" style="padding:0 20px 24px;display:flex;flex-direction:column;gap:10px"></div>
    <div style="padding:0 20px 32px">
        <button id="btn-submit-dispos" style="width:100%;padding:14px;border-radius:12px;border:none;background:#1a1a2e;color:white;font-size:15px;font-weight:600;cursor:pointer">
            Envoyer mes dispos
        </button>
    </div>
</div>

<script>
// ── Constantes ────────────────────────────────────────────────────────────────

const DAY_NAMES  = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
const MONTH_NAMES = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];

// ── Utilitaires ───────────────────────────────────────────────────────────────

function toDateStr(d) {
    return d.toISOString().slice(0, 10);
}

function getMondayOf(d) {
    const day  = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    const mon  = new Date(d);
    mon.setDate(d.getDate() + diff);
    mon.setHours(0, 0, 0, 0);
    return mon;
}

function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
}

function fmtHour(h) {
    return String(Math.floor(h % 24)).padStart(2, '0') + 'h';
}

function fmtDuration(h) {
    const total = h;
    const hrs   = Math.floor(total);
    const mins  = Math.round((total - hrs) * 60);
    return mins > 0 ? hrs + 'h' + String(mins).padStart(2, '0') : hrs + 'h';
}

// ── Auth ──────────────────────────────────────────────────────────────────────

async function checkAuth() {
    try {
        const res = await fetch('/auth/me', { credentials: 'include' });
        if (res.status === 401) { window.location.href = '/login.html'; return null; }
        return (await res.json()).user;
    } catch {
        window.location.href = '/login.html';
        return null;
    }
}

async function logout() {
    await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login.html';
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
    const user = await checkAuth();
    if (!user) return;

    // Le patron n'a pas accès à cette page
    if (user.role === 'patron') {
        window.location.href = '/index.html';
        return;
    }

    document.getElementById('greeting-name').textContent = 'Bonjour ' + (user.name || '') + ' !';

    initTabs();

    // Charger les dispos quand on clique sur l'onglet
    document.querySelector('[data-tab="dispos"]').addEventListener('click', () => {
        loadDisposTab();
    });

    const monday = getMondayOf(new Date());
    const sunday = addDays(monday, 6);
    const from   = toDateStr(monday);
    const to     = toDateStr(sunday);

    // Label semaine dans le header
    document.getElementById('header-week').textContent =
        'Semaine du ' + monday.getDate() + ' ' + MONTH_NAMES[monday.getMonth()] +
        ' au ' + sunday.getDate() + ' ' + MONTH_NAMES[sunday.getMonth()];

    await loadPlanning(from, to, user);
}

// ── Chargement ────────────────────────────────────────────────────────────────

async function loadPlanning(from, to, user) {
    const list = document.getElementById('days-list');

    try {
        const res  = await fetch('/api/my-shifts?from=' + from + '&to=' + to, { credentials: 'include' });

        // Vérifier que la réponse est bien du JSON
        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
            // Le serveur a renvoyé du HTML → session expirée ou erreur serveur
            if (res.status === 401) {
                window.location.href = '/login.html';
                return;
            }
            throw new Error('Erreur serveur (' + res.status + ')');
        }

        const data = await res.json();

        if (!res.ok) {
            // Cas spécifique : compte non lié à un profil staff
            if (data.error && data.error.includes('profil staff')) {
                list.innerHTML =
                    '<div class="empty-week">' +
                        '<div class="empty-week-icon">⚠️</div>' +
                        '<div class="empty-week-text">Compte non configuré</div>' +
                        '<div class="empty-week-sub">Ton compte n est pas encore lié à un profil staff.<br>Contacte ton responsable.</div>' +
                    '</div>';
                return;
            }
            throw new Error(data.error || 'Erreur inconnue');
        }

        renderStats(data.shifts);
        renderDays(from, data.shifts, data.colleagues);

    } catch (e) {
        list.innerHTML = '<div class="state-msg error">' + e.message + '</div>';
    }
}

// ── Stats semaine ─────────────────────────────────────────────────────────────

function renderStats(shifts) {
    const nbShifts  = shifts.length;
    const totalH    = shifts.reduce((a, s) => a + (s.end_time - s.start_time), 0);
    const nbJours   = new Set(shifts.map(s => s.date)).size;
    const statsEl   = document.getElementById('week-stats') || document.getElementById('week-stats-wrap');
    if (statsEl) statsEl.style.display = '';
    statsEl.innerHTML =
        statCard(nbJours,              'Jours') +
        statCard(nbShifts,             'Shifts') +
        statCard(fmtDuration(totalH),  'Heures');
}

function statCard(value, label) {
    return '<div class="stat-card">' +
        '<div class="stat-value">' + value + '</div>' +
        '<div class="stat-label">' + label + '</div>' +
    '</div>';
}

// ── Rendu des jours ───────────────────────────────────────────────────────────

function renderDays(from, shifts, colleagues) {
    const list   = document.getElementById('days-list');
    const today  = toDateStr(new Date());
    const monday = new Date(from + 'T00:00:00');

    // Si aucun shift toute la semaine
    if (shifts.length === 0) {
        list.innerHTML =
            '<div class="empty-week">' +
                '<div class="empty-week-icon">📅</div>' +
                '<div class="empty-week-text">Aucun shift cette semaine</div>' +
                '<div class="empty-week-sub">Reviens plus tard ou contacte ton responsable</div>' +
            '</div>';
        return;
    }

    list.innerHTML = '';

    for (let i = 0; i < 7; i++) {
        const date      = toDateStr(addDays(monday, i));
        const d         = addDays(monday, i);
        const dayShifts = shifts.filter(s => s.date === date);
        const isToday   = date === today;
        const hasShift  = dayShifts.length > 0;

        const card = document.createElement('div');
        card.className = 'day-card' + (isToday ? ' today' : '') + (!hasShift ? ' no-shift' : '');

        // En-tête du jour
        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerHTML =
            '<div class="day-date-block">' +
                '<div class="day-weekday">' + DAY_NAMES[d.getDay()] + '</div>' +
                '<div class="day-num">' + d.getDate() + '</div>' +
            '</div>' +
            '<div class="day-header-right">' +
                (!hasShift
                    ? '<span class="day-rest">Repos</span>'
                    : '<span class="today-badge">Aujourd\'hui</span>') +
            '</div>';
        card.appendChild(header);

        // Shifts du jour
        dayShifts.forEach(shift => {
            const block = document.createElement('div');
            block.className = 'shift-block';

            const duration     = shift.end_time - shift.start_time;
            const dayColleagues = (colleagues[date] || [])
                .filter(c => c.establishment_id === shift.establishment_id);

            let colleaguesHTML = '';
            if (dayColleagues.length > 0) {
                const pills = dayColleagues.map(c =>
                    '<span class="colleague-pill">' +
                        '<span class="colleague-dot" style="background:' + (c.color || '#888') + '"></span>' +
                        c.staff_name +
                    '</span>'
                ).join('');
                colleaguesHTML =
                    '<div class="colleagues-label">Collègues</div>' +
                    '<div class="colleagues-list">' + pills + '</div>';
            }

            block.innerHTML =
                '<div class="shift-top">' +
                    '<span class="shift-establishment">' + formatEstablishment(shift.establishment_id) + '</span>' +
                    '<span class="shift-hours-badge">' + fmtHour(shift.start_time) + ' → ' + fmtHour(shift.end_time) + '</span>' +
                '</div>' +
                '<div class="shift-duration">' + fmtDuration(duration) + ' de service</div>' +
                (colleaguesHTML ? '<div style="margin-top:10px">' + colleaguesHTML + '</div>' : '');

            card.appendChild(block);
        });

        list.appendChild(card);
    }
}

// ── Formatage nom établissement ───────────────────────────────────────────────

function formatEstablishment(id) {
    const map = {
        'Josy_pub':          'Josy — Pub',
        'Poni_restaurant':   'Poni — Restaurant',
        'FanFan_restaurant': 'FanFan — Restaurant',
        'Caval_restaurant':  'Caval — Restaurant',
    };
    return map[id] || id;
}

// ── Navigation onglets ───────────────────────────────────────────────────────

function initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (btn.disabled) return;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.getElementById('view-planning').style.display = tab === 'planning' ? '' : 'none';
            document.getElementById('view-dispos').style.display   = tab === 'dispos'   ? '' : 'none';
        });
    });
}

// ── Disponibilités ────────────────────────────────────────────────────────────

const DISPO_TYPES = {
    soir:   { label: 'Soir',   start: 16, end: 26 },
    midi:   { label: 'Midi',   start: 10, end: 17 },
    custom: { label: 'Horaires précis', start: null, end: null },
    off:    { label: 'Indisponible', start: null, end: null },
};

let dispoSettings  = null;
let dispoSelections = {}; // { "2025-06-23": { type, start_time, end_time, note } }

async function loadDisposTab() {
    // Charger les paramètres
    const sRes = await fetch('/api/dispo-settings', { credentials: 'include' });
    dispoSettings = await sRes.json();

    const statusEl = document.getElementById('dispos-status');
    const formEl   = document.getElementById('dispos-form');
    const btnSubmit = document.getElementById('btn-submit-dispos');

    // Deadline
    const deadline = new Date(dispoSettings.deadline);
    const fmtDate  = deadline.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });

    if (!dispoSettings.canSubmit) {
        statusEl.textContent   = dispoSettings.deadlinePassed
            ? 'Deadline dépassée (vendredi 13h). Réouverture la semaine prochaine.'
            : 'Saisie fermée par le responsable.';
        statusEl.style.color   = '#e74c3c';
        formEl.innerHTML       = '<div style="padding:20px 0;text-align:center;color:#ccc;font-size:14px">La saisie des disponibilités n est pas disponible.</div>';
        btnSubmit.disabled     = true;
        btnSubmit.style.background = '#ccc';
        return;
    }

    statusEl.textContent = 'Deadline : ' + fmtDate;
    statusEl.style.color = '#aaa';

    // Semaine suivante
    const nextMonday = getMondayOf(addDays(new Date(), 7));

    // Charger les dispos existantes
    const from = toDateStr(nextMonday);
    const to   = toDateStr(addDays(nextMonday, 6));
    const dRes = await fetch('/api/dispos/mine?from=' + from + '&to=' + to, { credentials: 'include' });
    const existingDispos = dRes.ok ? await dRes.json() : [];

    // Pré-remplir les sélections
    dispoSelections = {};
    existingDispos.forEach(d => {
        dispoSelections[d.date] = { type: d.type, start_time: d.start_time, end_time: d.end_time, note: d.note || '' };
    });

    // Générer les 7 cartes
    formEl.innerHTML = '';
    for (let i = 0; i < 7; i++) {
        const date = toDateStr(addDays(nextMonday, i));
        const d    = addDays(nextMonday, i);
        formEl.appendChild(createDispoCard(date, d));
    }

    btnSubmit.addEventListener('click', submitDispos);
}

function createDispoCard(date, d) {
    const sel    = dispoSelections[date] || { type: null };
    const card   = document.createElement('div');
    card.className = 'dispo-card';

    const fmt = h => String(Math.floor(h % 24)).padStart(2, '0') + ':00';

    card.innerHTML =
        '<div class="dispo-day-header">' +
            '<div>' +
                '<div class="dispo-day-name">' + DAY_NAMES[d.getDay()] + ' ' + d.getDate() + ' ' + MONTH_NAMES[d.getMonth()] + '</div>' +
            '</div>' +
        '</div>' +
        '<div class="dispo-body">' +
            '<div class="dispo-type-row">' +
                ['soir', 'midi', 'custom', 'off'].map(type => {
                    const active = sel.type === type ? ' selected-' + type : '';
                    return '<button class="dispo-type-btn' + active + '" data-date="' + date + '" data-type="' + type + '">' +
                        DISPO_TYPES[type].label + '</button>';
                }).join('') +
            '</div>' +
            '<div class="dispo-custom-row' + (sel.type === 'custom' ? ' visible' : '') + '" id="custom-' + date + '">' +
                '<input class="dispo-time-input" id="start-' + date + '" type="text" placeholder="10:00" value="' + (sel.start_time ? fmt(sel.start_time) : '') + '">' +
                '<span style="color:#aaa">→</span>' +
                '<input class="dispo-time-input" id="end-' + date + '" type="text" placeholder="18:00" value="' + (sel.end_time ? fmt(sel.end_time) : '') + '">' +
            '</div>' +
            '<textarea class="dispo-note-input" id="note-' + date + '" placeholder="Note (optionnel)..." rows="1">' + (sel.note || '') + '</textarea>' +
        '</div>';

    // Listeners boutons type
    card.querySelectorAll('.dispo-type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.dataset.type;
            const date = btn.dataset.date;

            // Reset tous les boutons de cette carte
            card.querySelectorAll('.dispo-type-btn').forEach(b => {
                b.className = 'dispo-type-btn';
            });
            btn.classList.add('selected-' + type);

            // Afficher/masquer les horaires précis
            const customRow = document.getElementById('custom-' + date);
            customRow.classList.toggle('visible', type === 'custom');

            // Mettre à jour la sélection
            if (type === 'off') {
                dispoSelections[date] = { type: 'off', start_time: null, end_time: null, note: '' };
            } else if (type === 'custom') {
                dispoSelections[date] = { type: 'custom', start_time: null, end_time: null, note: '' };
            } else {
                dispoSelections[date] = {
                    type,
                    start_time: DISPO_TYPES[type].start,
                    end_time:   DISPO_TYPES[type].end,
                    note: '',
                };
            }
        });
    });

    return card;
}

async function submitDispos() {
    const btn    = document.getElementById('btn-submit-dispos');
    btn.disabled = true;
    btn.textContent = 'Envoi…';

    const dispos = [];
    const nextMonday = getMondayOf(addDays(new Date(), 7));

    for (let i = 0; i < 7; i++) {
        const date = toDateStr(addDays(nextMonday, i));
        const sel  = dispoSelections[date];
        if (!sel || sel.type === null || sel.type === 'off') continue;

        // Horaires précis : lire les champs
        let start = sel.start_time;
        let end   = sel.end_time;
        if (sel.type === 'custom') {
            const startVal = document.getElementById('start-' + date)?.value;
            const endVal   = document.getElementById('end-'   + date)?.value;
            start = parseFloat(startVal?.split(':')[0]) || null;
            end   = parseFloat(endVal?.split(':')[0])   || null;
            if (!start || !end || end <= start) {
                showMsg('Horaires invalides pour le ' + date, 'error');
                btn.disabled    = false;
                btn.textContent = 'Envoyer mes dispos';
                return;
            }
        }

        const note = document.getElementById('note-' + date)?.value || '';
        dispos.push({ date, type: sel.type, start_time: start, end_time: end, note });
    }

    if (dispos.length === 0) {
        showMsg('Sélectionne au moins un jour disponible.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Envoyer mes dispos';
        return;
    }

    try {
        const res  = await fetch('/api/dispos', {
            credentials: 'include',
            method:      'POST',
            headers:     { 'Content-Type': 'application/json' },
            body:        JSON.stringify({ dispos }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showMsg(data.message, 'success');
        btn.textContent = 'Dispos envoyées ✓';
    } catch (e) {
        showMsg(e.message, 'error');
        btn.disabled    = false;
        btn.textContent = 'Envoyer mes dispos';
    }
}

function showMsg(text, type) {
    const existing = document.getElementById('dispo-msg');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.id = 'dispo-msg';
    el.style.cssText = 'margin:0 20px 12px;padding:10px 14px;border-radius:8px;font-size:13px;' +
        (type === 'error'
            ? 'background:#fff5f5;border:1px solid #f5c6c6;color:#c0392b;'
            : 'background:#f0faf5;border:1px solid #a8dfc7;color:#1a7a4a;');
    el.textContent = text;
    document.getElementById('dispos-form').before(el);
}

// ── Démarrage ─────────────────────────────────────────────────────────────────

init();
</script>
