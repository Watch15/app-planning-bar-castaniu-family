<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pointage — Planning Bar</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            color: #1a1a2e;
        }
        .header {
            background: white;
            border-bottom: 1px solid #e8e8e8;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }
        .header-sub   { font-size: 12px; color: #aaa; margin-top: 2px; }
        .btn-logout {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .container { max-width: 680px; margin: 0 auto; padding: 20px 16px 40px; }

        /* ── Shift card ── */
        .shift-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e8e8e8;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .shift-card.extra-card {
            border-color: #f39c12;
            background: #fffbf0;
        }
        .shift-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f5;
        }
        .shift-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .shift-name  { font-size: 14px; font-weight: 700; flex: 1; }
        .shift-planned {
            font-size: 12px;
            color: #aaa;
            background: #f8f8f8;
            padding: 3px 8px;
            border-radius: 6px;
        }
        .extra-badge {
            font-size: 10px;
            font-weight: 700;
            color: #f39c12;
            background: #fff3cd;
            padding: 2px 7px;
            border-radius: 6px;
            border: 1px solid #f39c12;
        }
        .shift-body {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .time-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 100px; }
        .time-label { font-size: 10px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
        .time-input {
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            width: 100%;
            outline: none;
            transition: border-color .15s;
        }
        .time-input:focus { border-color: #534AB7; }
        .time-input.filled { border-color: #2ecc71; background: #f0fdf4; }
        .ecart-badge {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ecart-badge.pos  { background: #fff3cd; color: #d68910; }
        .ecart-badge.neg  { background: #fde8e8; color: #c0392b; }
        .ecart-badge.zero { background: #eafaf1; color: #27ae60; }
        .btn-save {
            padding: 8px 18px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
        .btn-save.saved { background: #2ecc71; }

        /* ── Section extra ── */
        .extra-section {
            background: white;
            border-radius: 12px;
            border: 1.5px dashed #e0e0e0;
            padding: 18px 16px;
            margin-top: 24px;
        }
        .extra-title {
            font-size: 13px;
            font-weight: 700;
            color: #555;
            margin-bottom: 14px;
        }
        .extra-form { display: flex; flex-direction: column; gap: 10px; }
        .extra-form input, .extra-form select {
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            outline: none;
            width: 100%;
        }
        .extra-form input:focus { border-color: #534AB7; }
        .extra-row { display: flex; gap: 8px; }
        .extra-row .time-input { flex: 1; }
        .staff-suggestions {
            background: white;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            max-height: 160px;
            overflow-y: auto;
            display: none;
        }
        .staff-suggestion-item {
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .staff-suggestion-item:hover { background: #f5f5f5; }
        .btn-add-extra {
            padding: 10px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
        }
        .btn-add-extra:disabled { background: #ccc; cursor: not-allowed; }

        .empty-msg {
            text-align: center;
            color: #ccc;
            font-size: 14px;
            padding: 40px 0;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
            z-index: 9999;
        }
        .toast.visible { opacity: 1; }
        .toast.error   { background: #e74c3c; }
    </style>
</head>
<body>

<header class="header">
    <div>
        <div class="header-title" id="header-title">Pointage</div>
        <div class="header-sub"  id="header-date"></div>
    </div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
</header>

<div class="container">
    <div id="shifts-list"></div>

    <!-- Service non planifié -->
    <div class="extra-section">
        <div class="extra-title">＋ Ajouter un service non planifié</div>
        <div class="extra-form">
            <div style="position:relative">
                <input type="text" id="extra-staff-search" placeholder="Rechercher un membre du staff…" autocomplete="off">
                <div class="staff-suggestions" id="staff-suggestions"></div>
            </div>
            <input type="hidden" id="extra-staff-id">
            <input type="text"   id="extra-staff-name-free" placeholder="Ou saisir un nom libre (si hors staff)" style="display:none">
            <div class="extra-row">
                <div class="time-group">
                    <div class="time-label">Début réel</div>
                    <input type="time" class="time-input" id="extra-real-start">
                </div>
                <div class="time-group">
                    <div class="time-label">Fin réelle</div>
                    <input type="time" class="time-input" id="extra-real-end">
                </div>
            </div>
            <button class="btn-add-extra" id="btn-add-extra">Enregistrer le service</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Utilitaires ───────────────────────────────────────────────────────────────

function toDateStr(d) {
    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
}

function fmtH(h) {
    if (h == null) return '--:--';
    const hh = Math.floor(h % 24);
    const mm = Math.round((h % 1) * 60);
    return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
}

function parseTimeInput(val) {
    if (!val) return null;
    const [h, m] = val.split(':').map(Number);
    return h + m / 60;
}

function ecartLabel(planned, real) {
    if (real == null || planned == null) return null;
    const diff = real - planned;
    if (Math.abs(diff) < 0.01) return { text: '= planifié', cls: 'zero' };
    const mins = Math.round(Math.abs(diff) * 60);
    const h    = Math.floor(mins / 60);
    const m    = mins % 60;
    const str  = (h ? h + 'h' : '') + (m ? String(m).padStart(2,'0') + 'min' : '');
    return diff > 0
        ? { text: '+' + str, cls: 'pos' }
        : { text: '−' + str, cls: 'neg' };
}

let toastTimer;
function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast visible' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = 'toast', 2500);
}

async function logout() {
    await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login.html';
}

// ── Auth ──────────────────────────────────────────────────────────────────────

let currentUser = null;
let allStaff    = [];
const today     = toDateStr(new Date());

async function checkAuth() {
    try {
        const res  = await fetch('/auth/me', { credentials: 'include' });
        if (!res.ok) { window.location.href = '/login.html'; return null; }
        const data = await res.json();
        if (data.user?.role !== 'etablissement' && data.user?.role !== 'patron') {
            window.location.href = '/login.html'; return null;
        }
        return data.user;
    } catch { window.location.href = '/login.html'; return null; }
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
    currentUser = await checkAuth();
    if (!currentUser) return;

    // Date du jour
    const d = new Date();
    const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('header-date').textContent =
        d.toLocaleDateString('fr-FR', opts).charAt(0).toUpperCase() +
        d.toLocaleDateString('fr-FR', opts).slice(1);

    // Charger staff pour l'autocomplete
    try {
        const r = await fetch('/api/staff', { credentials: 'include' });
        if (r.ok) allStaff = await r.json();
    } catch { allStaff = []; }

    // Nom de l'établissement dans le header
    if (currentUser.establishment_id) {
        try {
            const r = await fetch('/api/establishments', { credentials: 'include' });
            if (r.ok) {
                const estabs = await r.json();
                const e = estabs.find(x => x.id === currentUser.establishment_id || String(x._id) === currentUser.establishment_id);
                if (e) document.getElementById('header-title').textContent = 'Pointage — ' + e.name;
            }
        } catch {}
    }

    await loadShifts();
    initExtraForm();
}

// ── Chargement des shifts ─────────────────────────────────────────────────────

async function loadShifts() {
    const list = document.getElementById('shifts-list');
    list.innerHTML = '<div class="empty-msg">Chargement…</div>';
    try {
        const url = '/api/pointage/' + today +
            (currentUser.role === 'patron' ? '?establishment_id=' + currentUser.establishment_id : '');
        const res    = await fetch(url, { credentials: 'include' });
        const shifts = await res.json();
        if (!res.ok) throw new Error(shifts.error);

        // Filtrer les Jokers
        const visible = shifts.filter(s => !s.is_joker && s.staff_id !== '__joker__');

        if (visible.length === 0) {
            list.innerHTML = '<div class="empty-msg">Aucun shift planifié aujourd\'hui</div>';
            return;
        }

        list.innerHTML = '';
        visible.forEach(s => list.appendChild(buildShiftCard(s)));

    } catch (e) {
        list.innerHTML = '<div class="empty-msg" style="color:#e74c3c">' + e.message + '</div>';
    }
}

// ── Construction d'une carte shift ───────────────────────────────────────────

function buildShiftCard(shift) {
    const card = document.createElement('div');
    card.className = 'shift-card' + (shift.extra ? ' extra-card' : '');
    card.dataset.id = String(shift._id);

    const realStartVal = shift.real_start != null ? fmtH(shift.real_start) : '';
    const realEndVal   = shift.real_end   != null ? fmtH(shift.real_end)   : '';
    const plannedLabel = fmtH(shift.start_time) + ' → ' + fmtH(shift.end_time);

    const ecartDuree = (() => {
        if (shift.real_start == null || shift.real_end == null) return null;
        const realDur    = shift.real_end   - shift.real_start;
        const plannedDur = shift.end_time   - shift.start_time;
        return ecartLabel(plannedDur, realDur);
    })();

    card.innerHTML =
        '<div class="shift-header">' +
            '<div class="shift-dot" style="background:' + (shift.color || '#888') + '"></div>' +
            '<div class="shift-name">' + (shift.staff_name || '—') + '</div>' +
            (shift.extra
                ? '<span class="extra-badge">Hors planning</span>'
                : '<span class="shift-planned">' + plannedLabel + '</span>') +
        '</div>' +
        '<div class="shift-body">' +
            '<div class="time-group">' +
                '<div class="time-label">Début réel</div>' +
                '<input type="time" class="time-input real-start' + (realStartVal ? ' filled' : '') + '" value="' + realStartVal + '">' +
            '</div>' +
            '<div class="time-group">' +
                '<div class="time-label">Fin réelle</div>' +
                '<input type="time" class="time-input real-end' + (realEndVal ? ' filled' : '') + '" value="' + realEndVal + '">' +
            '</div>' +
            (ecartDuree ? '<span class="ecart-badge ' + ecartDuree.cls + '">' + ecartDuree.text + '</span>' : '<span class="ecart-badge" style="opacity:0">—</span>') +
            '<button class="btn-save">Enregistrer</button>' +
        '</div>';

    // Mise à jour de l'écart en temps réel
    const startInput = card.querySelector('.real-start');
    const endInput   = card.querySelector('.real-end');
    const ecartEl    = card.querySelector('.ecart-badge');
    const btnSave    = card.querySelector('.btn-save');

    function updateEcart() {
        const rs = parseTimeInput(startInput.value);
        const re = parseTimeInput(endInput.value);
        startInput.classList.toggle('filled', !!startInput.value);
        endInput.classList.toggle('filled',   !!endInput.value);
        if (rs != null && re != null && re > rs) {
            const realDur    = re - rs;
            const plannedDur = shift.end_time - shift.start_time;
            const e = ecartLabel(plannedDur, realDur);
            if (e) { ecartEl.textContent = e.text; ecartEl.className = 'ecart-badge ' + e.cls; ecartEl.style.opacity = '1'; }
        } else {
            ecartEl.style.opacity = '0';
        }
    }

    startInput.addEventListener('input', updateEcart);
    endInput.addEventListener('input',   updateEcart);

    btnSave.addEventListener('click', async () => {
        const rs = parseTimeInput(startInput.value);
        const re = parseTimeInput(endInput.value);
        if (rs == null && re == null) { showToast('Saisis au moins une heure', true); return; }
        btnSave.disabled = true;
        try {
            const res = await fetch('/api/shifts/' + shift._id + '/pointage', {
                credentials: 'include', method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ real_start: rs, real_end: re }),
            });
            const d = await res.json();
            if (!res.ok) throw new Error(d.error);
            btnSave.textContent = '✓ Enregistré';
            btnSave.className   = 'btn-save saved';
            showToast(shift.staff_name + ' — heures enregistrées');
        } catch (e) {
            showToast(e.message, true);
            btnSave.disabled = false;
        }
    });

    return card;
}

// ── Formulaire service extra ──────────────────────────────────────────────────

function initExtraForm() {
    const searchInput = document.getElementById('extra-staff-search');
    const suggestions = document.getElementById('staff-suggestions');
    const hiddenId    = document.getElementById('extra-staff-id');
    const freeName    = document.getElementById('extra-staff-name-free');

    // Autocomplete staff
    searchInput.addEventListener('input', () => {
        const val = searchInput.value.toLowerCase().trim();
        hiddenId.value = '';
        freeName.style.display = 'none';

        if (!val) { suggestions.style.display = 'none'; return; }

        const matches = allStaff.filter(s => s.name.toLowerCase().includes(val)).slice(0, 6);
        suggestions.innerHTML = '';

        if (matches.length === 0) {
            // Aucun staff trouvé — proposer le nom libre
            freeName.style.display = '';
            freeName.value = searchInput.value;
            suggestions.style.display = 'none';
            return;
        }

        matches.forEach(s => {
            const item = document.createElement('div');
            item.className = 'staff-suggestion-item';
            item.innerHTML =
                '<span style="width:10px;height:10px;border-radius:50%;background:' + s.color + ';flex-shrink:0;display:inline-block"></span>' +
                '<span>' + s.name + '</span>';
            item.addEventListener('click', () => {
                searchInput.value  = s.name;
                hiddenId.value     = String(s._id);
                freeName.style.display = 'none';
                suggestions.style.display = 'none';
            });
            suggestions.appendChild(item);
        });

        // Option nom libre
        const libre = document.createElement('div');
        libre.className = 'staff-suggestion-item';
        libre.style.color = '#aaa';
        libre.innerHTML = '<span style="font-size:12px">✏️ Saisir "' + searchInput.value + '" comme nom libre</span>';
        libre.addEventListener('click', () => {
            hiddenId.value = '';
            freeName.style.display = '';
            freeName.value = searchInput.value;
            suggestions.style.display = 'none';
        });
        suggestions.appendChild(libre);

        suggestions.style.display = '';
    });

    // Fermer suggestions au clic extérieur
    document.addEventListener('click', e => {
        if (!e.target.closest('#extra-staff-search') && !e.target.closest('#staff-suggestions'))
            suggestions.style.display = 'none';
    });

    // Bouton enregistrer extra
    document.getElementById('btn-add-extra').addEventListener('click', async () => {
        const staffId   = document.getElementById('extra-staff-id').value || null;
        const staffName = freeName.style.display !== 'none'
            ? freeName.value.trim()
            : searchInput.value.trim();
        const realStart = parseTimeInput(document.getElementById('extra-real-start').value);
        const realEnd   = parseTimeInput(document.getElementById('extra-real-end').value);

        if (!staffName)       { showToast('Nom du staff requis', true);          return; }
        if (realStart == null) { showToast('Heure de début requise', true);       return; }
        if (realEnd   == null) { showToast('Heure de fin requise', true);         return; }
        if (realEnd <= realStart) { showToast('Fin doit être après le début', true); return; }

        const btn = document.getElementById('btn-add-extra');
        btn.disabled = true;
        try {
            const res = await fetch('/api/shifts/extra', {
                credentials: 'include', method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    staff_id:   staffId,
                    staff_name: staffName,
                    date:       today,
                    real_start: realStart,
                    real_end:   realEnd,
                }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);

            // Ajouter la carte du nouveau shift
            document.getElementById('shifts-list').appendChild(buildShiftCard(data));

            // Reset form
            searchInput.value = '';
            freeName.value    = '';
            freeName.style.display = 'none';
            document.getElementById('extra-real-start').value = '';
            document.getElementById('extra-real-end').value   = '';
            document.getElementById('extra-staff-id').value   = '';
            showToast(staffName + ' — service ajouté');
        } catch (e) {
            showToast(e.message, true);
        } finally {
            btn.disabled = false;
        }
    });
}

init();
</script>
</body>
</html>
